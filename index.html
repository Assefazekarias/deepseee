<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Deep Sea Adventure 🎣</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div id="gameWrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="scanlines"></div>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-box">
        <div class="hud-label">Score</div>
        <div class="hud-value" id="scoreDisplay">0</div>
        <div class="hud-label" id="targetScoreDisplay" style="font-size: clamp(8px, 1.5vw, 10px);">Target: 100</div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center;">
        <div id="levelDisplay"
          style="font-size: clamp(14px, 3vw, 18px); color: var(--neon-cyan); font-weight: bold; text-shadow: 0 0 10px var(--neon-cyan); margin-bottom: -5px;">
          LVL 1</div>
        <div id="timerDisplay">30</div>
      </div>
      <div class="hud-box">
        <div class="hud-label">Best</div>
        <div class="hud-value" id="bestDisplay">0</div>
      </div>
    </div>

    <!-- Start Screen -->
    <div class="screen" id="startScreen">
      <div class="game-title">🎣 Deep Sea<br>Adventure</div>
      <div class="title-sub">Reel in the ocean's riches</div>
      <div class="fish-showcase">
        <div class="fish-card">
          <span class="fish-emoji">🐟</span>
          <div class="fish-name">Small</div>
          <div class="fish-pts">10 pts</div>
        </div>
        <div class="fish-card">
          <span class="fish-emoji">🐠</span>
          <div class="fish-name">Medium</div>
          <div class="fish-pts">25 pts</div>
        </div>
        <div class="fish-card">
          <span class="fish-emoji">🐡</span>
          <div class="fish-name">Rare</div>
          <div class="fish-pts">50 pts</div>
        </div>
        <div class="fish-card">
          <span class="fish-emoji">🦑</span>
          <div class="fish-name">Kraken</div>
          <div class="fish-pts">100 pts</div>
        </div>
      </div>
      <button class="btn btn-primary" id="startBtn">Cast Off! 🌊</button>
      <div class="hint">Tap / Click / Space to drop the hook</div>
    </div>

    <!-- Level Clear Screen -->
    <div class="screen hidden" id="levelClearScreen">
      <div class="game-title" style="font-size:clamp(28px,6vw,52px); margin-bottom:12px;">Level Clear!</div>
      <div class="final-score-label">Current Score</div>
      <div class="final-score-value" id="levelScoreDisplay">0</div>
      <button class="btn btn-primary" id="nextLevelBtn">Next Level 🌊</button>
    </div>

    <!-- Game Over Screen -->
    <div class="screen hidden" id="gameOverScreen">
      <div class="game-title" id="gameOverTitle" style="font-size:clamp(28px,6vw,52px); margin-bottom:12px;">🏆 Haul
        Report</div>
      <div class="final-score-label">Your Score</div>
      <div class="final-score-value" id="finalScore">0</div>
      <div class="best-score" id="bestLabel"></div>
      <button class="btn btn-primary" id="restartBtn">Cast Again! 🎣</button>
      <button class="btn btn-secondary" id="menuBtn">Main Menu</button>
    </div>
  </div>

  <script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const CONFIG = {
  GAME_DURATION: 30,
  FISH_SPAWN_RATE: 90, // frames between spawns
  FISH_SPAWN_RATE_MIN: 35,
  LINE_X_RANGE: 0.15, // hook sway range as fraction of width
  WATER_SURFACE_RATIO: 0.13, // how far down the water surface is
};

const FISH_TYPES = [
  { id: 'small', emoji: '🐟', points: 10, speed: 2.2, size: 24, color: '#00bfff', weight: 45 },
  { id: 'medium', emoji: '🐠', points: 25, speed: 1.6, size: 30, color: '#ff7f50', weight: 30 },
  { id: 'rare', emoji: '🐡', points: 50, speed: 2.8, size: 26, color: '#ffd700', weight: 18 },
  { id: 'kraken', emoji: '🦑', points: 100, speed: 1.1, size: 40, color: '#ff6ec7', weight: 7 },
];

const TRASH_TYPES = [
  { id: 'boot', emoji: '🥾', points: -20, speed: 1.0, size: 24, color: '#8b4513', weight: 50 },
  { id: 'can', emoji: '🥫', points: -10, speed: 1.2, size: 18, color: '#c0c0c0', weight: 50 },
];

const LEVELS = [
  { level: 1, targetScore: 100, speedMult: 1.0, trashChance: 0.05, depthColor1: '#020b18', depthColor2: '#041d3a', depthColor3: '#062e57', depthColor4: '#030e1f' },
  { level: 2, targetScore: 250, speedMult: 1.2, trashChance: 0.15, depthColor1: '#010814', depthColor2: '#03172e', depthColor3: '#052547', depthColor4: '#020a17' },
  { level: 3, targetScore: 500, speedMult: 1.5, trashChance: 0.25, depthColor1: '#01050d', depthColor2: '#021021', depthColor3: '#031933', depthColor4: '#010610' },
  { level: 4, targetScore: 800, speedMult: 1.8, trashChance: 0.35, depthColor1: '#000308', depthColor2: '#010a17', depthColor3: '#021024', depthColor4: '#01040a' },
  { level: 5, targetScore: 1200, speedMult: 2.2, trashChance: 0.50, depthColor1: '#000000', depthColor2: '#00040a', depthColor3: '#010712', depthColor4: '#000205' },
];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let canvas, ctx, W, H;
let gameState = 'start'; // start | playing | over
let score = 0, timeLeft = CONFIG.GAME_DURATION;
let bestScore = parseInt(localStorage.getItem('deepSeaBestScore')) || 0;
let currentLevel = 1;
let screenShakeTime = 0;
let timerInterval = null;
let frameCount = 0, spawnRate = CONFIG.FISH_SPAWN_RATE;
let animId = null;

let isPaused = false;
let streak = 0;
let frenzyTimer = 0;

let inputY = 0;
const hook = { x: 0, y: 0, vy: 0, caught: null };
const fishes = [];
const particles = [];
const bubbles = [];
const floatingTexts = [];

// Audio
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playBloop(freq = 440, type = 'sine') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}
function playCatch(pts) {
  initAudio();
  if (pts >= 100) { playBloop(880, 'sawtooth'); setTimeout(() => playBloop(1100, 'sine'), 80); }
  else if (pts >= 50) { playBloop(660, 'sine'); setTimeout(() => playBloop(880, 'sine'), 80); }
  else if (pts >= 25) { playBloop(520, 'sine'); }
  else { playBloop(380, 'sine'); }
}
function playError() {
  initAudio();
  playBloop(150, 'sawtooth');
  setTimeout(() => playBloop(100, 'sawtooth'), 100);
}
function playSplash() { initAudio(); playBloop(200, 'triangle'); }

// ─────────────────────────────────────────────
//  CANVAS SETUP
// ─────────────────────────────────────────────
function setupCanvas() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  hook.x = W / 2;
  if (gameState !== 'playing') {
    hook.y = surfaceY() - 10;
    inputY = hook.y;
  }
}

function surfaceY() { return H * CONFIG.WATER_SURFACE_RATIO + 60; }

// ─────────────────────────────────────────────
//  SPAWN
// ─────────────────────────────────────────────
function spawnFish() {
  const levelData = LEVELS[currentLevel - 1];
  let isTrash = Math.random() < levelData.trashChance;

  let type;
  if (isTrash) {
    const totalWeight = TRASH_TYPES.reduce((s, t) => s + t.weight, 0);
    let r = Math.random() * totalWeight;
    type = TRASH_TYPES[0];
    for (const t of TRASH_TYPES) { r -= t.weight; if (r <= 0) { type = t; break; } }
  } else {
    const totalWeight = FISH_TYPES.reduce((s, t) => s + t.weight, 0);
    let r = Math.random() * totalWeight;
    type = FISH_TYPES[0];
    for (const t of FISH_TYPES) { r -= t.weight; if (r <= 0) { type = t; break; } }
  }

  const dir = Math.random() < 0.5 ? 1 : -1;
  const minY = surfaceY() + 60;
  const maxY = H - 60;
  let startY = minY + Math.random() * (maxY - minY);

  fishes.push({
    ...type,
    x: dir > 0 ? -type.size : W + type.size,
    y: startY,
    baseY: startY,
    dir,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.04 + Math.random() * 0.04,
    alpha: 1,
    caught: false,
    speed: type.speed * levelData.speedMult,
    isTrash: isTrash,
    frightTimer: 0
  });
}

// ─────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────
function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: 0.03 + Math.random() * 0.03,
      size: 3 + Math.random() * 5,
      color,
    });
  }
}

// ─────────────────────────────────────────────
//  DRAWING
// ─────────────────────────────────────────────
function drawBackground() {
  const levelData = LEVELS[currentLevel - 1];
  // Deep ocean gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, levelData.depthColor1);
  bg.addColorStop(0.12, levelData.depthColor2);
  bg.addColorStop(0.5, levelData.depthColor3);
  bg.addColorStop(1, levelData.depthColor4);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Neon gold glow overlay if Frenzy
  if (frenzyTimer > 0) {
    ctx.save();
    let pulse = 0.5 + Math.sin(frameCount * 0.15) * 0.5;
    let fade = frenzyTimer > 30 ? 1 : frenzyTimer / 30; 
    ctx.globalAlpha = fade * 0.3 * pulse; // Max 0.3 opacity
    const fGrad = ctx.createLinearGradient(0, 0, 0, H);
    fGrad.addColorStop(0, '#ffd700');
    fGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = fGrad;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // Caustic light rays
  const sY = surfaceY();
  ctx.save();
  for (let i = 0; i < 6; i++) {
    const x = W * (0.1 + i * 0.15) + Math.sin(frameCount * 0.01 + i) * 20;
    const grad = ctx.createLinearGradient(x, sY, x + 30, H);
    grad.addColorStop(0, 'rgba(0,200,255,0.07)');
    grad.addColorStop(1, 'rgba(0,200,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(x - 20, sY);
    ctx.lineTo(x + 40, sY);
    ctx.lineTo(x + 80, H);
    ctx.lineTo(x - 60, H);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // Water surface
  const sGrad = ctx.createLinearGradient(0, sY - 30, 0, sY + 20);
  sGrad.addColorStop(0, 'rgba(14,95,168,0)');
  sGrad.addColorStop(0.5, 'rgba(26,143,224,0.7)');
  sGrad.addColorStop(1, 'rgba(14,95,168,0.2)');
  ctx.fillStyle = sGrad;
  ctx.beginPath();
  ctx.moveTo(0, sY - 10);
  for (let x = 0; x <= W; x += 20) {
    ctx.lineTo(x, sY - 6 + Math.sin(x * 0.03 + frameCount * 0.04) * 5);
  }
  ctx.lineTo(W, sY - 10);
  ctx.closePath();
  ctx.fill();

  // Sky / boat area
  const skyGrad = ctx.createLinearGradient(0, 0, 0, sY);
  skyGrad.addColorStop(0, '#87ceeb');
  skyGrad.addColorStop(0.6, '#4fa8d8');
  skyGrad.addColorStop(1, '#1a6fa8');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, sY - 10);

  // Boat
  drawBoat(W / 2, sY); // keep boat centered at W/2 instead of hook.x to show drag

  // Distant bubbles
  ctx.save();
  for (const b of bubbles) {
    ctx.globalAlpha = b.alpha;
    ctx.strokeStyle = 'rgba(0,245,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBoat(x, sY) {
  ctx.save();
  // Hull
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.moveTo(x - 45, sY - 8);
  ctx.lineTo(x + 45, sY - 8);
  ctx.lineTo(x + 35, sY + 12);
  ctx.lineTo(x - 35, sY + 12);
  ctx.closePath();
  ctx.fill();
  // Deck
  ctx.fillStyle = '#A0522D';
  ctx.fillRect(x - 40, sY - 18, 80, 12);
  // Mast
  ctx.strokeStyle = '#5C3317';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x, sY - 18);
  ctx.lineTo(x, sY - 60);
  ctx.stroke();
  // Flag
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(x, sY - 60);
  ctx.lineTo(x + 22, sY - 52);
  ctx.lineTo(x, sY - 44);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawLine() {
  const sY = surfaceY();
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(W / 2, sY - 18);

  // Drag curve based on vertical velocity
  let cpX = W / 2 + (hook.x - W / 2) / 2;
  let cpY = (sY - 18 + hook.y) / 2 - hook.vy * 1.5;

  ctx.quadraticCurveTo(cpX, cpY, hook.x, hook.y - 12);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawHook() {
  const x = hook.x, y = hook.y;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(hook.vy * -0.02); // Drag rotation

  ctx.strokeStyle = '#c0c0c0';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  // Hook shaft
  ctx.beginPath();
  ctx.moveTo(0, -12);
  ctx.lineTo(0, 8);
  ctx.stroke();
  // Hook curve
  ctx.beginPath();
  ctx.arc(-6, 8, 6, 0, Math.PI * 0.9);
  ctx.stroke();
  // Point
  ctx.beginPath();
  ctx.moveTo(-12, 10);
  ctx.lineTo(-9, 5);
  ctx.stroke();

  // Glint
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(2, -6, 2, 0, Math.PI * 2);
  ctx.fill();

  // Caught fish
  if (hook.caught) {
    ctx.font = `${hook.caught.size * 2}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.translate(0, 15);
    ctx.rotate(Math.PI / 2);
    ctx.fillText(hook.caught.emoji, 0, 0);
  }

  ctx.restore();
}

function drawFish(f) {
  ctx.save();
  ctx.globalAlpha = f.alpha;
  ctx.translate(f.x, f.y);
  if (f.dir < 0) ctx.scale(-1, 1);
  ctx.font = `${f.size * 2}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(f.emoji, 0, 0);
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────
function update() {
  if (isPaused) return;

  frameCount++;
  const sY = surfaceY();

  if (frenzyTimer > 0) frenzyTimer--;

  // Spawn fish
  if (frameCount % spawnRate === 0) {
    spawnFish();
    spawnRate = Math.max(CONFIG.FISH_SPAWN_RATE_MIN, CONFIG.FISH_SPAWN_RATE - Math.floor(frameCount / 300) * 5);
  }

  // Move fish
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];
    if (!f.caught) {
      // Fright response
      let distToHook = Math.hypot(hook.x - f.x, hook.y - f.y);
      if (distToHook < 100 && !f.frightTimer) {
        f.frightTimer = 90; // 1.5 seconds
      }

      if (f.frightTimer > 0) {
        f.frightTimer--;
        f.x += f.dir * (f.speed * 2);
        f.wobble += f.wobbleSpeed * 1.5;
      } else {
        f.x += f.dir * f.speed;
        f.wobble += f.wobbleSpeed;
      }

      // Sine wave bobbing
      f.y = f.baseY + Math.sin(f.wobble) * 15;
    }
    // Remove out-of-bounds
    if ((f.dir > 0 && f.x > W + 80) || (f.dir < 0 && f.x < -80)) {
      fishes.splice(i, 1);
    }
  }

  // Hook physics
  if (gameState === 'playing') {
    let targetY = Math.max(sY - 10, Math.min(H - 20, inputY));
    let prevY = hook.y;

    if (hook.caught) {
      // Auto-Retrieve
      hook.y -= 20; // fast speed
      if (hook.y < sY - 10) hook.y = sY - 10;
      hook.vy = hook.y - prevY;

      // Release catch at surface
      if (hook.y <= sY + 5) {
        hook.caught = null;
      }
    } else {
      // Manual Down
      hook.y += (targetY - hook.y) * 0.15; // Smooth lerp
      hook.vy = hook.y - prevY;

      // Catch fish?
      for (let i = fishes.length - 1; i >= 0; i--) {
        const f = fishes[i];
        if (f.caught) continue;
        const dx = hook.x - f.x, dy = hook.y - f.y;
        if (Math.sqrt(dx * dx + dy * dy) < f.size + 10) {
          f.caught = true;
          hook.caught = f;

          let pts = f.points;
          if (pts > 0 && frenzyTimer > 0) pts *= 2;

          if (f.isTrash) {
            streak = 0;
          } else {
            streak++;
            if (streak >= 3) {
              if (frenzyTimer <= 0) {
                frenzyTimer = 300;
                showCatchPopup(W / 2, sY + 100, 'FRENZY!', '#ffd700');
              }
              streak = 0;
            }
          }

          score += pts;
          updateScoreDisplay();
          showCatchPopup(hook.x, hook.y, pts, pts < 0 ? '#ff4444' : f.color);

          if (f.id === 'rare' || f.id === 'kraken') {
            screenShakeTime = 15;
          }
          if (pts < 0) {
            playError();
          } else {
            playCatch(pts);
          }

          spawnParticles(hook.x, hook.y, f.color);
          fishes.splice(i, 1);
          break;
        }
      }
    }

    // Idle sway
    hook.x = W / 2 + Math.sin(frameCount * 0.03) * 8;
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Bubbles
  if (Math.random() < 0.1) {
    bubbles.push({
      x: Math.random() * W,
      y: H + 10,
      r: 2 + Math.random() * 8,
      speed: 1.0 + Math.random() * 2.0,
      alpha: 0.3 + Math.random() * 0.5,
    });
  }
  for (let i = bubbles.length - 1; i >= 0; i--) {
    bubbles[i].y -= bubbles[i].speed;
    if (bubbles[i].y < surfaceY()) bubbles.splice(i, 1);
  }
}

// ─────────────────────────────────────────────
//  RENDER LOOP
// ─────────────────────────────────────────────
function render() {
  ctx.save();
  if (screenShakeTime > 0) {
    const intensity = (screenShakeTime / 15) * 6;
    const dx = (Math.random() - 0.5) * intensity;
    const dy = (Math.random() - 0.5) * intensity;
    ctx.translate(dx, dy);
    if (!isPaused) screenShakeTime--;
  }

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  if (gameState === 'playing') {
    drawLine();
    for (const f of fishes) drawFish(f);
    drawHook();
    drawParticles();
    drawFloatingTexts();

    if (isPaused) {
      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'white';
      ctx.font = '900 clamp(40px, 8vw, 60px) var(--font-display)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#00ffff';
      ctx.shadowBlur = 20;
      ctx.fillText('PAUSED', W / 2, H / 2);
      ctx.restore();
    }
  }
  ctx.restore();
}

function gameLoop() {
  if (gameState === 'playing') {
    update();
    render();
  }
  animId = requestAnimationFrame(gameLoop);
}

// ─────────────────────────────────────────────
//  UI
// ─────────────────────────────────────────────
function updateScoreDisplay() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('targetScoreDisplay').textContent = 'Target: ' + LEVELS[currentLevel - 1].targetScore;
  document.getElementById('levelDisplay').textContent = 'LVL ' + currentLevel;
}

function showCatchPopup(x, y, text, color) {
  floatingTexts.push({
    x, y, text: String(text), color: color || 'var(--neon-gold)', life: 1.0
  });
}

function drawFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ctx.save();
    ctx.globalAlpha = ft.life;
    ctx.font = `900 ${Math.max(18, 28 * ft.life)}px var(--font-display)`;
    ctx.textAlign = 'center';
    ctx.fillStyle = ft.color;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 10;
    
    let displayStr = ft.text;
    if (!isNaN(ft.text) && Number(ft.text) > 0) displayStr = `+${ft.text}`;
    ctx.fillText(displayStr, ft.x, ft.y);
    ctx.restore();

    if (!isPaused) {
      ft.y -= 1.5;
      ft.life -= 0.02;
    }
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function startTimer(startTime = CONFIG.GAME_DURATION) {
  timeLeft = startTime;
  const timerEl = document.getElementById('timerDisplay');
  timerEl.textContent = timeLeft;
  if (timeLeft > 8) timerEl.classList.remove('urgent');

  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;
    if (timeLeft <= 8) timerEl.classList.add('urgent');
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

// ─────────────────────────────────────────────
//  GAME CONTROL
// ─────────────────────────────────────────────
function startGame(fromLevel1 = true) {
  if (fromLevel1) {
    currentLevel = 1;
    score = 0;
  }
  fishes.length = 0;
  particles.length = 0;
  bubbles.length = 0;
  floatingTexts.length = 0;
  frameCount = 0;
  spawnRate = CONFIG.FISH_SPAWN_RATE;

  streak = 0;
  frenzyTimer = 0;
  isPaused = false;
  
  const pBtn = document.getElementById('pauseBtn');
  if (pBtn) {
    pBtn.style.display = 'block';
    pBtn.innerHTML = '⏸️';
  }

  inputY = surfaceY() - 10;
  hook.x = W / 2;
  hook.y = surfaceY() - 10;
  hook.vy = 0;
  hook.caught = null;

  updateScoreDisplay();
  document.getElementById('bestDisplay').textContent = bestScore;

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('levelClearScreen').classList.add('hidden');
  gameState = 'playing';

  startTimer();
  if (!animId) gameLoop();
}

function endGame() {
  gameState = 'over';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('deepSeaBestScore', bestScore);
  }
  
  const pBtn = document.getElementById('pauseBtn');
  if (pBtn) pBtn.style.display = 'none';

  const target = LEVELS[currentLevel - 1].targetScore;
  if (score >= target) {
    // Level clear!
    document.getElementById('levelScoreDisplay').textContent = score;
    if (currentLevel >= LEVELS.length) {
      // Game complete
      document.getElementById('gameOverTitle').textContent = '🌟 Ocean Master!';
      document.getElementById('finalScore').textContent = score;
      document.getElementById('bestLabel').textContent = 'You completed all levels!';
      document.getElementById('gameOverScreen').classList.remove('hidden');
    } else {
      // Show next level screen
      document.getElementById('levelClearScreen').classList.remove('hidden');
    }
  } else {
    // Game over / Failed
    document.getElementById('gameOverTitle').textContent = '💀 Level Failed';
    document.getElementById('finalScore').textContent = score;
    document.getElementById('bestLabel').textContent = `Target was ${target} pts`;
    document.getElementById('gameOverScreen').classList.remove('hidden');
  }
  document.getElementById('bestDisplay').textContent = bestScore;
}

function nextLevel() {
  currentLevel++;
  startGame(false);
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
function setupInput() {
  // Create pause button
  const pauseBtn = document.createElement('div');
  pauseBtn.id = 'pauseBtn';
  pauseBtn.innerHTML = '⏸️';
  pauseBtn.style.position = 'absolute';
  pauseBtn.style.top = '10px';
  pauseBtn.style.right = '15px';
  pauseBtn.style.fontSize = 'clamp(24px, 5vw, 32px)';
  pauseBtn.style.cursor = 'pointer';
  pauseBtn.style.zIndex = '1000';
  pauseBtn.style.textShadow = '0 0 10px var(--neon-cyan)';
  pauseBtn.style.display = 'none';
  pauseBtn.style.userSelect = 'none'; // prevent selection
  pauseBtn.style.pointerEvents = 'auto'; // allow clicks despite #hud pointer-events: none
  document.getElementById('hud').appendChild(pauseBtn);

  function togglePause() {
    if (gameState === 'playing') {
      isPaused = !isPaused;
      pauseBtn.innerHTML = isPaused ? '▶️' : '⏸️';
      if (isPaused) {
        clearInterval(timerInterval);
      } else {
        startTimer(timeLeft); // resume with current timeLeft
      }
    }
  }

  pauseBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    togglePause();
  });

  pauseBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    e.stopPropagation();
    togglePause();
  }, { passive: false });

  // Mouse
  canvas.addEventListener('mousemove', e => {
    if (gameState === 'playing' && !isPaused) inputY = e.clientY;
  });
  canvas.addEventListener('mousedown', e => {
    if (gameState === 'playing' && !isPaused) inputY = e.clientY;
  });

  // Touch
  canvas.addEventListener('touchmove', e => {
    if (gameState === 'playing' && !isPaused) {
      e.preventDefault();
      inputY = e.touches[0].clientY;
    }
  }, { passive: false });
  canvas.addEventListener('touchstart', e => {
    if (gameState === 'playing' && !isPaused) {
      inputY = e.touches[0].clientY;
    }
  }, { passive: false });

  // Buttons
  document.getElementById('startBtn').addEventListener('click', () => { initAudio(); startGame(true); });
  document.getElementById('startBtn').addEventListener('touchend', e => { e.preventDefault(); initAudio(); startGame(true); });

  document.getElementById('restartBtn').addEventListener('click', () => startGame(true));
  document.getElementById('restartBtn').addEventListener('touchend', e => { e.preventDefault(); startGame(true); });

  document.getElementById('nextLevelBtn').addEventListener('click', nextLevel);
  document.getElementById('nextLevelBtn').addEventListener('touchend', e => { e.preventDefault(); nextLevel(); });

  document.getElementById('menuBtn').addEventListener('click', showMenu);
  document.getElementById('menuBtn').addEventListener('touchend', e => { e.preventDefault(); showMenu(); });
}

function showMenu() {
  clearInterval(timerInterval);
  gameState = 'start';
  const pBtn = document.getElementById('pauseBtn');
  if (pBtn) pBtn.style.display = 'none';
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('bestDisplay').textContent = bestScore;
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
setupCanvas();
setupInput();
document.getElementById('bestDisplay').textContent = bestScore;
// Background render on start screen
gameLoop();
</script>
